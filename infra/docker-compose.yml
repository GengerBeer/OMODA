services:
  postgres:
    image: postgres:16-alpine
    container_name: newstok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: newstok
      POSTGRES_USER: newstok
      POSTGRES_PASSWORD: newstok
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: newstok-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
